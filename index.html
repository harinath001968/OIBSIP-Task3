<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>🌡 Temperature Converter</h1>

        <p class="subtitle">
    Convert temperatures instantly between Celsius, Fahrenheit and Kelvin
</p>

        <div class="input-group">
            <label>Enter Temperature</label>
            <input type="number" id="temperature" placeholder="Enter value">
        </div>

        <div class="dropdowns">

            <div class="input-group">
                <label>From</label>
                <select id="fromUnit">
                    <option value="celsius">Celsius</option>
                    <option value="fahrenheit">Fahrenheit</option>
                    <option value="kelvin">Kelvin</option>
                </select>
            </div>

            <div class="input-group">
                <label>To</label>
                <select id="toUnit">
                    <option value="fahrenheit">Fahrenheit</option>
                    <option value="celsius">Celsius</option>
                    <option value="kelvin">Kelvin</option>
                </select>
            </div>

        </div>

        <div class="buttons">
            <button onclick="convertTemperature()">Convert</button>
            <button class="reset" onclick="resetFields()">Reset</button>
        </div>

        <div class="result-box">
            <h2>Converted Temperature</h2>
<p id="result">--</p>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
